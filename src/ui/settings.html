<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Pics - Settings</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="settings-page">
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>E-Pics</h1>
      </div>
      <nav class="sidebar-nav">
        <button id="backToGallery" class="nav-item">
          <span class="icon">←</span> Back to Gallery
        </button>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content settings-content">
      <div class="settings-container">
        <h1>Settings</h1>

        <!-- Password Section -->
        <section class="settings-section">
          <h2>Security</h2>
          <div class="setting-item">
            <label>Change Password</label>
            <button id="changePasswordBtn" class="btn btn-secondary">Change Password</button>
          </div>
        </section>

        <!-- Storage Section -->
        <section class="settings-section">
          <h2>Storage</h2>
          <div class="setting-item">
            <label>Vault Location:</label>
            <p id="storagePath" class="storage-path"></p>
          </div>
          <div class="setting-item">
            <label>
              <input type="checkbox" id="thumbnailToggle">
              Enable Thumbnails
            </label>
          </div>
        </section>

        <!-- Theme Section -->
        <section class="settings-section">
          <h2>Appearance</h2>
          <div class="setting-item">
            <label for="themeSelect">Theme:</label>
            <select id="themeSelect" class="form-select">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
              <option value="auto">System</option>
            </select>
          </div>
        </section>

        <!-- About Section -->
        <section class="settings-section">
          <h2>About</h2>
          <div class="setting-item">
            <p>E-Pics v1.0.0</p>
            <p class="text-muted">Personal Photo & Video Vault</p>
          </div>
        </section>
      </div>
    </main>
  </div>

  <!-- Change Password Modal -->
  <div id="passwordModal" class="modal hidden">
    <div class="modal-content">
      <h2>Change Password</h2>
      <div class="form-group">
        <label for="currentPassword">Current Password</label>
        <input type="password" id="currentPassword" placeholder="Enter current password">
      </div>
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" placeholder="Enter new password">
      </div>
      <div class="form-group">
        <label for="confirmNewPassword">Confirm New Password</label>
        <input type="password" id="confirmNewPassword" placeholder="Confirm new password">
      </div>
      <div class="modal-actions">
        <button id="cancelPasswordBtn" class="btn btn-secondary">Cancel</button>
        <button id="savePasswordBtn" class="btn btn-primary">Save</button>
      </div>
      <div id="passwordError" class="error-message"></div>
    </div>
  </div>

  <script src="js/settings.js"></script>
</body>
</html>
