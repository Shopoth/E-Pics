<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Pics - Photo Vault Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>E-Pics</h1>
        <p>Personal Photo & Video Vault</p>
      </div>

      <div id="loginForm" class="auth-form">
        <h2>Login</h2>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>
        <button id="loginBtn" class="btn btn-primary">Login</button>
        <p class="form-hint">First time? Set a password to create your vault.</p>
        <button id="switchToRegister" class="btn btn-secondary">Create New Vault</button>
        <div id="loginError" class="error-message"></div>
      </div>

      <div id="registerForm" class="auth-form hidden">
        <h2>Create Your Vault</h2>
        <div class="form-group">
          <label for="registerPassword">Create Password</label>
          <input type="password" id="registerPassword" placeholder="Choose a password" required>
          <small>At least 4 characters</small>
        </div>
        <div class="form-group">
          <label for="registerConfirm">Confirm Password</label>
          <input type="password" id="registerConfirm" placeholder="Confirm password" required>
        </div>
        <button id="registerBtn" class="btn btn-primary">Create Vault</button>
        <button id="switchToLogin" class="btn btn-secondary">Back to Login</button>
        <div id="registerError" class="error-message"></div>
      </div>

      <div id="loadingMessage" class="loading-message hidden">
        <p>Initializing vault...</p>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
