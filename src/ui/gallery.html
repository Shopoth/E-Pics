<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Pics - Gallery</title>
  <link rel="stylesheet" href="css/tailwind.css">
  <link rel="stylesheet" href="css/tailwind-custom.css">
  <link rel="stylesheet" href="css/icon-styles.css">
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 font-sans">
  <div class="min-h-screen lg:flex">
    <aside class="sidebar-sticky w-full lg:w-72 shrink-0 bg-slate-900 border-b border-slate-800 lg:border-b-0 lg:border-r">
      <div class="px-6 py-8 border-b border-slate-800">
        <h1 class="text-3xl font-semibold tracking-tight bg-gradient-to-r from-violet-400 via-sky-400 to-cyan-300 bg-clip-text text-transparent">E-Pics</h1>
      </div>
      <nav class="flex flex-wrap items-stretch gap-2 p-4 lg:flex-col">
        <button class="nav-item active flex items-center gap-3 w-full rounded-2xl px-4 py-3 text-left text-sm font-medium text-slate-300 transition hover:bg-slate-800 hover:text-white" data-view="all">
          <svg class="icon icon-nav" aria-hidden="true"><use href="icons/icons.svg#camera"></use></svg> All Files
        </button>
        <button class="nav-item flex items-center gap-3 w-full rounded-2xl px-4 py-3 text-left text-sm font-medium text-slate-300 transition hover:bg-slate-800 hover:text-white" data-view="favorites">
          <svg class="icon icon-nav" aria-hidden="true"><use href="icons/icons.svg#heart-outline"></use></svg> Favorites
        </button>
        <button class="nav-item flex items-center gap-3 w-full rounded-2xl px-4 py-3 text-left text-sm font-medium text-slate-300 transition hover:bg-slate-800 hover:text-white" data-view="images">
          <svg class="icon icon-nav" aria-hidden="true"><use href="icons/icons.svg#image"></use></svg> Images
        </button>
        <button class="nav-item flex items-center gap-3 w-full rounded-2xl px-4 py-3 text-left text-sm font-medium text-slate-300 transition hover:bg-slate-800 hover:text-white" data-view="videos">
          <svg class="icon icon-nav" aria-hidden="true"><use href="icons/icons.svg#video"></use></svg> Videos
        </button>
      </nav>
      <div class="mt-auto border-t border-slate-800 p-4 grid gap-2">
        <button id="settingsBtn" class="nav-item flex items-center gap-3 w-full rounded-2xl px-4 py-3 text-left text-sm font-medium text-slate-300 transition hover:bg-slate-800 hover:text-white">
          <svg class="icon icon-nav" aria-hidden="true"><use href="icons/icons.svg#settings"></use></svg> Settings
        </button>
        <button id="logoutBtn" class="nav-item flex items-center gap-3 w-full rounded-2xl px-4 py-3 text-left text-sm font-medium text-slate-300 transition hover:bg-slate-800 hover:text-white">
          <svg class="icon icon-nav" aria-hidden="true"><use href="icons/icons.svg#logout"></use></svg> Logout
        </button>
      </div>
    </aside>

    <main class="flex-1 bg-slate-950 overflow-y-auto">
      <div class="bg-slate-900 border-b border-slate-800 px-6 py-5 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
        <div class="flex-1 flex gap-3">
          <input type="text" id="searchInput" placeholder="Search by filename..." class="flex-1 rounded-2xl border border-slate-700 bg-slate-950/90 px-4 py-3 text-slate-100 placeholder:text-slate-500 focus:border-violet-400 focus:outline-none focus:ring-2 focus:ring-violet-500/20" />
          <button id="searchBtn" type="button" class="rounded-2xl bg-slate-800 px-4 py-3 text-lg text-slate-100 transition hover:bg-slate-700">
            <svg class="icon icon-button" aria-hidden="true"><use href="icons/icons.svg#search"></use></svg>
          </button>
        </div>

        <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
          <select id="sortSelect" class="rounded-2xl border border-slate-700 bg-slate-950/90 px-4 py-3 text-slate-100 focus:border-violet-400 focus:outline-none focus:ring-2 focus:ring-violet-500/20">
            <option value="recent">Recent</option>
            <option value="oldest">Oldest</option>
            <option value="name">Name (A-Z)</option>
            <option value="name-desc">Name (Z-A)</option>
          </select>
          <button id="importBtn" type="button" class="rounded-2xl bg-gradient-to-r from-violet-500 to-indigo-500 px-5 py-3 text-sm font-semibold text-white shadow-lg shadow-violet-500/20 transition hover:-translate-y-0.5">+ Import Files</button>
        </div>
      </div>

      <div class="p-6">
        <div id="galleryGrid" class="grid gap-4 grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5"></div>

        <div id="emptyState" class="hidden min-h-[20rem] flex-col items-center justify-center gap-5 rounded-3xl border border-dashed border-slate-700 bg-slate-900/80 p-10 text-center text-slate-300">
          <p class="text-lg font-medium">No files yet. Start by importing photos or videos!</p>
          <button id="emptyImportBtn" type="button" class="rounded-2xl bg-gradient-to-r from-violet-500 to-indigo-500 px-5 py-3 text-sm font-semibold text-white shadow-lg shadow-violet-500/20 transition hover:-translate-y-0.5">Import Your First File</button>
        </div>
      </div>

      <div id="contextMenu" class="hidden fixed z-50 min-w-[14rem] overflow-hidden rounded-3xl border border-slate-800 bg-slate-950 shadow-2xl shadow-black/60">
        <button class="context-item w-full px-4 py-3 text-left text-sm text-slate-200 transition hover:bg-slate-800" data-action="view">
          <svg class="icon icon-button" aria-hidden="true"><use href="icons/icons.svg#view"></use></svg> View
        </button>
        <button class="context-item w-full px-4 py-3 text-left text-sm text-slate-200 transition hover:bg-slate-800" data-action="favorite">
          <svg class="icon icon-button" aria-hidden="true"><use href="icons/icons.svg#heart-outline"></use></svg> Toggle Favorite
        </button>
        <button class="context-item w-full px-4 py-3 text-left text-sm text-slate-200 transition hover:bg-slate-800" data-action="export">
          <svg class="icon icon-button" aria-hidden="true"><use href="icons/icons.svg#export"></use></svg> Export
        </button>
        <button class="context-item w-full px-4 py-3 text-left text-sm text-rose-400 transition hover:bg-slate-800" data-action="delete">
          <svg class="icon icon-button" aria-hidden="true"><use href="icons/icons.svg#trash"></use></svg> Delete
        </button>
      </div>
    </main>
  </div>

  <div id="importModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4">
    <div class="w-full max-w-2xl rounded-[2rem] border border-slate-800 bg-slate-950 p-8 shadow-2xl shadow-black/50">
      <h2 class="text-2xl font-semibold text-slate-50">Importing Files</h2>
      <div id="importProgress" class="mt-6 space-y-3 max-h-72 overflow-y-auto"></div>
      <button id="closeImportModal" type="button" class="mt-6 hidden w-full rounded-2xl bg-gradient-to-r from-violet-500 to-indigo-500 px-5 py-3 text-sm font-semibold text-white shadow-lg shadow-violet-500/20 transition hover:-translate-y-0.5">Done</button>
    </div>
  </div>

  <script src="js/gallery.js"></script>
</body>
</html>
